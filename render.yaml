services:
  - type: web
    name: pms-generator
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: "true"
    healthCheckPath: /api/materials
    autoDeploy: true
